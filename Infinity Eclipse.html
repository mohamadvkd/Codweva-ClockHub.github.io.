<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; }

        .eclipse-bg {
            position: absolute; width: 100vmax; height: 100vmax;
            background: radial-gradient(circle, #2a1b0a 0%, #000 60%);
            filter: blur(50px); opacity: 0.6;
        }

        .clock {
            width: 86vmin; height: 86vmin; max-width: 520px; max-height: 520px;
            border-radius: 50%; position: relative;
            background: #080808;
            border: 2px solid #1a1a1a;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 80px rgba(212,175,55,0.05);
            display: flex; justify-content: center; align-items: center;
        }

        .glass-overlay {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%, rgba(255,255,255,0.02) 100%);
            z-index: 25; pointer-events: none;
        }

        .orbit {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 1px solid rgba(212,175,55,0.1);
        }

        .mark {
            position: absolute; width: 4px; height: 25px;
            background: linear-gradient(to bottom, #d4af37, transparent);
            left: 50%; top: 15px; transform-origin: center 245px; margin-left: -2px;
        }

        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; z-index: 10; border-radius: 20px; }
        
        .h { 
            width: 12px; height: 24%; background: #fff; margin-left: -6px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .m { 
            width: 8px; height: 35%; background: #d4af37; margin-left: -4px;
            box-shadow: 0 0 20px rgba(212,175,55,0.2);
        }

        .s { 
            width: 2px; height: 42%; background: #ff0055; margin-left: -1px;
            box-shadow: 0 0 15px #ff0055;
        }

        .s::after {
            content: ''; position: absolute; width: 12px; height: 12px;
            background: #ff0055; border-radius: 50%; top: -6px; left: -5px;
            box-shadow: 0 0 15px #ff0055;
        }

        .center {
            width: 20px; height: 20px; background: #000; border: 3px solid #d4af37;
            border-radius: 50%; z-index: 30; box-shadow: 0 0 20px #000;
        }

        .brand {
            position: absolute; top: 28%; color: rgba(212,175,55,0.4);
            font: 300 14px 'Segoe UI', sans-serif; letter-spacing: 10px;
        }

        .digital-date {
            position: absolute; bottom: 25%; color: rgba(255,255,255,0.2);
            font: 400 12px monospace; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="eclipse-bg" id="bg"></div>

    <div class="clock" id="c">
        <div class="glass-overlay"></div>
        <div class="orbit"></div>
        <div class="brand">CODEWEVA</div>
        <div class="digital-date" id="date"></div>
        <div class="face" id="f"></div>
        <div class="hand h" id="hour"></div>
        <div class="hand m" id="min"></div>
        <div class="hand s" id="sec"></div>
        <div class="center"></div>
    </div>

    <script>
        const f = document.getElementById('f');
        const bg = document.getElementById('bg');
        const c = document.getElementById('c');

        function init() {
            f.innerHTML = '';
            const r = c.offsetWidth / 2;
            for(let i=0; i<12; i++) {
                const m = document.createElement('div');
                m.className = 'mark';
                m.style.transform = `rotate(${i * 30}deg)`;
                m.style.transformOrigin = `center ${r - 15}px`;
                f.appendChild(m);
            }
        }

        function update() {
            const n = new Date();
            const h = n.getHours(), m = n.getMinutes(), s = n.getSeconds(), ms = n.getMilliseconds();
            
            document.getElementById('hour').style.transform = `rotate(${(h % 12) * 30 + m * 0.5}deg)`;
            document.getElementById('min').style.transform = `rotate(${m * 6 + s * 0.1}deg)`;
            document.getElementById('sec').style.transform = `rotate(${s * 6 + ms * 0.006}deg)`;
            
            const day = n.getDate().toString().padStart(2, '0');
            const month = (n.getMonth() + 1).toString().padStart(2, '0');
            document.getElementById('date').innerText = `${day} / ${month} / ${n.getFullYear()}`;

            const moveX = Math.sin(s * (Math.PI / 30)) * 20;
            const moveY = -Math.cos(s * (Math.PI / 30)) * 20;
            bg.style.transform = `translate(${moveX}px, ${moveY}px)`;

            requestAnimationFrame(update);
        }

        window.addEventListener('resize', init);
        init();
        update();
    </script>
</body>
</html>
