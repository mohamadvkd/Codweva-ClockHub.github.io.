<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Ultra Ring Clock</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #0b1220, #03050a);
  overflow:hidden;
  touch-action:none;
}

/* ===== الساعة ===== */
.clock{
  width:min(90vw, 360px);
  height:min(90vw, 360px);
  border-radius:50%;
  position:relative;

  background: radial-gradient(circle, #0a1a2f, #02040a);
  box-shadow:
    0 0 60px rgba(0,180,255,0.15),
    inset 0 0 40px rgba(255,255,255,0.05);
}

/* حلقات */
.ring{
  position:absolute;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.05);
}

.r1{ inset:40px; }
.r2{ inset:25px; }
.r3{ inset:10px; }

/* مركز */
.center{
  position:absolute;
  width:10px;
  height:10px;
  background:white;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 15px cyan;
}

/* ===== النقاط ===== */
.dot{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
}

/* ساعة */
.hour{
  width:14px;
  height:14px;
  background:white;
  box-shadow:0 0 15px white;
}

/* دقيقة */
.minute{
  width:10px;
  height:10px;
  background:#00d4ff;
  box-shadow:0 0 12px cyan;
}

/* ثانية */
.second{
  width:6px;
  height:6px;
  background:#ff3b3b;
  box-shadow:0 0 10px red;
}

/* trail للثواني */
.trail{
  position:absolute;
  width:4px;
  height:4px;
  background:red;
  border-radius:50%;
  opacity:0.3;
}

/* ===== الأرقام ===== */
.number{
  position:absolute;
  color:white;
  font-size:14px;
  opacity:0.8;
  transform:translate(-50%, -50%);
}

</style>
</head>

<body>

<div class="clock" id="clock">

  <!-- حلقات -->
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r3"></div>

  <!-- النقاط -->
  <div class="dot hour" id="hourDot"></div>
  <div class="dot minute" id="minuteDot"></div>
  <div class="dot second" id="secondDot"></div>

  <div class="center"></div>

</div>

<script>

const clock = document.getElementById("clock");

/* ===== أرقام ===== */
const numRadius = 155;
for(let i=1;i<=12;i++){
  const n = document.createElement("div");
  n.className = "number";
  n.innerText = i;

  const angle = (i*30-90)*Math.PI/180;
  const x = Math.cos(angle)*numRadius;
  const y = Math.sin(angle)*numRadius;

  n.style.left = `calc(50% + ${x}px)`;
  n.style.top = `calc(50% + ${y}px)`;

  clock.appendChild(n);
}

/* ===== المسارات ===== */
const hourR = 80;
const minuteR = 110;
const secondR = 135;

/* ===== trail ===== */
let trails = [];

function createTrail(x,y){
  const t = document.createElement("div");
  t.className = "trail";
  t.style.left = `calc(50% + ${x}px)`;
  t.style.top = `calc(50% + ${y}px)`;
  clock.appendChild(t);

  trails.push({el:t, life:1});
}

/* ===== الحركة ===== */
function setDot(el, angle, r){
  const rad = (angle-90)*Math.PI/180;
  const x = Math.cos(rad)*r;
  const y = Math.sin(rad)*r;

  el.style.transform = `translate(${x}px, ${y}px)`;

  return {x,y};
}

function update(){
  const now = new Date();

  const sec = now.getSeconds() + now.getMilliseconds()/1000;
  const min = now.getMinutes() + sec/60;
  const hr = (now.getHours()%12) + min/60;

  const secA = sec*6;
  const minA = min*6;
  const hrA = hr*30;

  const sPos = setDot(secondDot, secA, secondR);
  setDot(minuteDot, minA, minuteR);
  setDot(hourDot, hrA, hourR);

  createTrail(sPos.x, sPos.y);

  /* تقليل trail */
  trails.forEach((t,i)=>{
    t.life -= 0.02;
    t.el.style.opacity = t.life;

    if(t.life<=0){
      t.el.remove();
      trails.splice(i,1);
    }
  });
}

/* smooth animation */
function animate(){
  requestAnimationFrame(animate);
  update();
}

animate();

</script>

</body>
</html>
