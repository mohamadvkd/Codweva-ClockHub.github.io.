<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Concentric </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .clock-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
<div class="clock-container">
    <canvas id="clockCanvas"></canvas>
</div>

<script>
    (function() {
        const COLORS = {
            BACKGROUND: '#000000',
            OUTER_RING: '#4285F4',
            INNER_RING: '#EA4335',
            RING_BACKGROUND: '#1A1A1A',
            HOUR_TEXT: '#FFFFFF',
            DATE_TEXT: '#9AA0A6',
            NUMBERS: '#5F6368',
            CAPSULE_FRAME: '#3C4043',
            MINUTE_TEXT: '#EA4335',
            SECOND_TEXT: '#4285F4',
            COLON: '#FFFFFF',
            SHADOW: 'rgba(0,0,0,0.5)'
        };

        const canvas = document.getElementById('clockCanvas');
        let ctx = null;
        let width, height, centerX, centerY;
        let outerRadius, innerRadius, ringWidth;
        let capsuleX, capsuleY, capsuleWidth, capsuleHeight;
        let isLandscape = false;
        function initDimensions() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;

            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';

            ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);

            isLandscape = width > height;
            centerX = width / 2;
            centerY = height / 2;

            let referenceSize = Math.min(width, height);
            let padding = referenceSize * 0.18;

            outerRadius = (referenceSize / 2) - padding;
            innerRadius = outerRadius * 0.72;
            ringWidth = Math.max(3, outerRadius * 0.12);

            capsuleHeight = outerRadius * 0.45;
            capsuleWidth = capsuleHeight * 2.3;

            if (isLandscape) {
                capsuleX = centerX + outerRadius + ringWidth + 40;
                capsuleY = centerY;
            } else {
                capsuleX = centerX;
                capsuleY = centerY + outerRadius + ringWidth + 60;
            }
        }

        function drawArc(x, y, radius, start, end, color, width, shadow = false) {
            ctx.save();
            if (shadow) {
                ctx.shadowColor = COLORS.SHADOW;
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 4;
            }
            ctx.beginPath();
            ctx.arc(x, y, radius, start, end);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.restore();
        }

        function drawNumbers(ctx) {
            const fontSize = innerRadius * 0.12;
            ctx.font = `bold ${fontSize}px "Segoe UI", Roboto, sans-serif`;
            ctx.fillStyle = COLORS.NUMBERS;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            for (let i = 0; i < 60; i += 5) {
                let angle = (i * 6 - 90) * Math.PI / 180;
                let text = i === 0 ? "60" : i.toString();
                ctx.fillText(text, centerX + Math.cos(angle) * (outerRadius), centerY + Math.sin(angle) * (outerRadius));
                ctx.fillText(text, centerX + Math.cos(angle) * (innerRadius), centerY + Math.sin(angle) * (innerRadius));
            }
        }

        function drawCapsule(minutes, seconds) {
            const r = capsuleHeight / 2;
            const x = capsuleX - capsuleWidth / 2;
            const y = capsuleY - capsuleHeight / 2;
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.roundRect(x, y, capsuleWidth, capsuleHeight, r);
            ctx.fillStyle = COLORS.BACKGROUND;
            ctx.fill();
            ctx.strokeStyle = COLORS.CAPSULE_FRAME;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.restore();
            const timeStr = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            ctx.font = `bold ${capsuleHeight * 0.4}px monospace`;
            ctx.textAlign = 'center';
            
            ctx.fillStyle = COLORS.MINUTE_TEXT;
            ctx.fillText(minutes.toString().padStart(2,'0'), capsuleX - (capsuleWidth*0.18), capsuleY + 5);
            
            ctx.fillStyle = COLORS.COLON;
            ctx.fillText(":", capsuleX, capsuleY + 5);

            ctx.fillStyle = COLORS.SECOND_TEXT;
            ctx.fillText(seconds.toString().padStart(2,'0'), capsuleX + (capsuleWidth*0.18), capsuleY + 5);
        }

        function drawClock() {
            const now = new Date();
            const hours = now.getHours() % 12 || 12;
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const ms = now.getMilliseconds();
            ctx.clearRect(0, 0, width, height);

            drawArc(centerX, centerY, outerRadius, 0, Math.PI * 2, COLORS.RING_BACKGROUND, ringWidth);
            drawArc(centerX, centerY, innerRadius, 0, Math.PI * 2, COLORS.RING_BACKGROUND, ringWidth);

           
            const secAngle = ((seconds + ms / 1000) * 6 - 90) * Math.PI / 180;
            const minAngle = ((minutes + seconds / 60) * 6 - 90) * Math.PI / 180;
            drawArc(centerX, centerY, outerRadius, -Math.PI/2, secAngle, COLORS.OUTER_RING, ringWidth, true);
            drawArc(centerX, centerY, innerRadius, -Math.PI/2, minAngle, COLORS.INNER_RING, ringWidth, true);
            drawNumbers(ctx);
            ctx.save();
            ctx.font = `bold ${innerRadius * 0.85}px "Segoe UI", sans-serif`;
            ctx.fillStyle = COLORS.HOUR_TEXT;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(255,255,255,0.1)';
            ctx.shadowBlur = 20;
            ctx.fillText(hours.toString(), centerX, centerY);
            ctx.restore();

            
            const dateStr = now.toLocaleDateString('en-GB').replace(/\//g, '.');
            ctx.font = `${innerRadius * 0.2}px "Segoe UI", sans-serif`;
            ctx.fillStyle = COLORS.DATE_TEXT;
            ctx.fillText(dateStr, centerX, centerY + (innerRadius * 0.7));

         
            drawCapsule(minutes, seconds);

            requestAnimationFrame(drawClock);
        }
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }

        window.addEventListener('resize', initDimensions);
        initDimensions();
        drawClock();
    })();
</script>
</body>
</html>
