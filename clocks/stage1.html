<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --accent: #d4af37;
            --bg: #0a0a0a;
        }

        body { 
            min-height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: var(--bg); transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        /* حاوية الساعة النهائية */
        .clock {
            width: 88vmin; height: 88vmin; max-width: 480px; max-height: 480px;
            border-radius: 50%; position: relative;
            background: radial-gradient(circle at 30% 30%, #333, #000);
            /* إطارات معدنية متعددة الطبقات */
            box-shadow: 
                0 50px 100px rgba(0,0,0,0.9),
                inset 0 0 20px rgba(255,255,255,0.05),
                0 0 0 2vmin #151515,
                0 0 0 2.5vmin var(--accent),
                0 0 50px rgba(0,0,0,0.5);
            cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent;
            user-select: none; transition: 0.5s;
        }

        /* --- سر المرحلة 10: تأثير الزجاج المحدب --- */
        .clock::after {
            content: ''; position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            /* لمعة الزجاج المنحنية */
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
            pointer-events: none; z-index: 15;
        }

        .face {
            position: absolute; width: 92%; height: 92%; top: 4%; left: 4%;
            border-radius: 50%; background: #050505;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
        }

        .tick {
            position: absolute; width: 0.8vmin; height: 4.5vmin;
            background: var(--accent); left: 50%; top: 2%;
            transform-origin: center 40.5vmin; margin-left: -0.4vmin;
            border-radius: 2px; box-shadow: 0 0 15px var(--accent);
            transition: 0.6s;
        }

        /* العقارب المصقولة */
        .hand {
            position: absolute; bottom: 50%; left: 50%;
            transform-origin: bottom center; z-index: 10;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
        }
        .hour { width: 1.8vmin; height: 24vmin; background: #fff; margin-left: -0.9vmin; border-radius: 1vmin; }
        .minute { width: 1.2vmin; height: 34vmin; background: var(--accent); margin-left: -0.6vmin; transition: 0.6s; }
        .second { width: 0.4vmin; height: 40vmin; background: #ff3e3e; margin-left: -0.21vmin; }

        .center {
            width: 5vmin; height: 5vmin; background: var(--accent); border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 20; border: 4px solid #000; box-shadow: 0 0 20px var(--accent);
            transition: 0.6s;
        }

        .brand {
            position: absolute; top: 28%; left: 50%; transform: translateX(-50%);
            color: #444; font: italic 2.5vmin serif; letter-spacing: 1vmin;
        }
    </style>
</head>
<body>

    <div class="clock" id="clock" tabindex="0">
        <div class="face" id="face">
            <div class="brand">LUXURY</div>
        </div>
        <div class="hand hour" id="h"></div>
        <div class="hand minute" id="m"></div>
        <div class="hand second" id="s"></div>
        <div class="center"></div>
    </div>

    <script>
        const face = document.getElementById('face');
        const clock = document.getElementById('clock');
        
        // توليد المؤشرات
        for (let i = 0; i < 12; i++) {
            let tick = document.createElement('div');
            tick.className = 'tick';
            tick.style.transform = `rotate(${i * 30}deg)`;
            face.appendChild(tick);
        }

        // ثيمات المرحلة النهائية
        const themes = [
            { accent: '#d4af37', bg: '#0a0a0a' }, // ذهبي
            { accent: '#00f2ff', bg: '#050a0f' }, // نيون
            { accent: '#e74c3c', bg: '#1a0505' }, // أحمر ياقوتي
            { accent: '#ffffff', bg: '#111111' }  // فضي
        ];
        let currentTheme = 0;

        clock.addEventListener('click', () => {
            currentTheme = (currentTheme + 1) % themes.length;
            document.documentElement.style.setProperty('--accent', themes[currentTheme].accent);
            document.documentElement.style.setProperty('--bg', themes[currentTheme].bg);
        });

        function update() {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();
            
            document.getElementById('h').style.transform = `rotate(${(h % 12) * 30 + m * 0.5}deg)`;
            document.getElementById('m').style.transform = `rotate(${m * 6 + s * 0.1}deg)`;
            document.getElementById('s').style.transform = `rotate(${s * 6 + ms * 0.006}deg)`;
            
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
