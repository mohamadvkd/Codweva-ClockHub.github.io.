<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Luxury Blue</title>
    <style>
        body { background: #0a0b0e; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }

        .clock-base {
            width: 300px; height: 300px;
            background: #111;
            border-radius: 50%;
            position: relative;
            border: 4px solid #1a1a1a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 2px 5px rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
        }

        /* المينا بنمط التدرج الشعاعي (من الجزء الأول) */
        .dial-surface {
            width: 94%; height: 94%;
            border-radius: 50%;
            position: relative;
            background: 
                radial-gradient(circle at 50% 10%, rgba(255,255,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* --- الإضافة الجديدة: المرحلة 4 (العلامات) --- */
        .indices-container {
            position: absolute; width: 100%; height: 100%;
        }
        .mark {
            position: absolute; width: 2px; height: 12px;
            background: rgba(255, 255, 255, 0.2);
            left: 50%;
            transform-origin: 0 141px; /* تم تعديلها لتناسب حجم المينا */
            margin-left: -1px;
            top: 10px;
        }
        .mark.main {
            width: 4px; height: 20px;
            background: #2f81f7; /* الأزرق المشع */
            margin-left: -2px;
            box-shadow: 0 0 10px rgba(47, 129, 247, 0.5);
        }

        /* العقارب (من الجزء الأول) */
        .hand {
            position: absolute; bottom: 50%; left: 50%;
            transform-origin: bottom; border-radius: 20px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
        }
        .hour { width: 8px; height: 65px; margin-left: -4px; background: #fff; z-index: 3; }
        .minute { width: 5px; height: 100px; margin-left: -2.5px; background: #eee; z-index: 2; }
        .second { 
            width: 2px; height: 125px; margin-left: -1px; 
            background: #2f81f7; z-index: 4; /* التوهج الأزرق */
            box-shadow: 0 0 15px rgba(47, 129, 247, 0.6); 
        }

        .center-pin {
            width: 12px; height: 12px; background: #fff; border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; border: 2px solid #2f81f7;
        }
    </style>
</head>
<body>

    <div class="clock-base">
        <div class="dial-surface">
            <div class="indices-container" id="indices"></div>
            
            <div class="hand hour" id="hourHand"></div>
            <div class="hand minute" id="minuteHand"></div>
            <div class="hand second" id="secondHand"></div>
            <div class="center-pin"></div>
        </div>
    </div>

    <script>
        // برمجة توزيع العلامات (Indices)
        const container = document.getElementById('indices');
        for (let i = 0; i < 12; i++) {
            const mark = document.createElement('div');
            mark.className = i % 3 === 0 ? 'mark main' : 'mark';
            mark.style.transform = `rotate(${i * 30}deg) translateY(5px)`; // translateY لظهور المؤشر داخل المينا
            container.appendChild(mark);
        }

        // تشغيل حركة العقارب (Logic)
        function updateClock() {
            const now = new Date();
            const s = now.getSeconds();
            const m = now.getMinutes();
            const h = now.getHours();

            document.getElementById('secondHand').style.transform = `rotate(${s * 6}deg)`;
            document.getElementById('minuteHand').style.transform = `rotate(${m * 6 + s * 0.1}deg)`;
            document.getElementById('hourHand').style.transform = `rotate(${(h % 12) * 30 + m * 0.5}deg)`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
