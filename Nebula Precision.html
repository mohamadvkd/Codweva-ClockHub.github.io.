<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050505;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        .nebula {
            position: absolute;
            width: 120vmax;
            height: 120vmax;
            background: radial-gradient(circle, #1e3a8a 0%, #581c87 30%, #000 70%);
            filter: blur(80px);
            animation: rotate 20s linear infinite;
            opacity: 0.4;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .clock {
            width: 85vmin;
            height: 85vmin;
            max-width: 460px;
            max-height: 460px;
            border-radius: 50%;
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 30px rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .tick {
            position: absolute;
            width: 2px;
            height: 15px;
            background: rgba(255, 255, 255, 0.2);
            left: 50%;
            top: 20px;
            transform-origin: center 210px; 
        }

        .tick.main {
            width: 4px;
            height: 25px;
            background: #00f2ff;
            box-shadow: 0 0 15px #00f2ff;
        }

      
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
            z-index: 10;
        }

        .hour {
            width: 8px;
            height: 25%;
            background: #fff;
            margin-left: -4px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .minute {
            width: 5px;
            height: 38%;
            background: rgba(255, 255, 255, 0.7);
            margin-left: -2.5px;
        }

        .second {
            width: 2px;
            height: 45%;
            background: #ff0055;
            margin-left: -1px;
            box-shadow: 0 0 15px #ff0055;
        }

        .center {
            width: 15px;
            height: 15px;
            background: #fff;
            border-radius: 50%;
            z-index: 20;
            box-shadow: 0 0 20px #fff;
        }

        .brand {
            position: absolute;
            top: 30%;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 5px;
            font-size: 14px;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div class="nebula"></div>

    <div class="clock" id="clock">
        <div class="brand">CODEWEVA</div>
        <div class="face" id="face"></div>
        <div class="hand hour" id="h"></div>
        <div class="hand minute" id="m"></div>
        <div class="hand second" id="s"></div>
        <div class="center"></div>
    </div>

    <script>
        const face = document.getElementById('face');
        const clock = document.getElementById('clock');

       
        function createTicks() {
            face.innerHTML = '';
            const radius = clock.offsetWidth / 2;
            for (let i = 0; i < 12; i++) {
                const tick = document.createElement('div');
                tick.className = i % 3 === 0 ? 'tick main' : 'tick';
                tick.style.transform = `rotate(${i * 30}deg)`;
              
                tick.style.transformOrigin = `center ${radius - 20}px`;
                face.appendChild(tick);
            }
        }

        function update() {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds(), ms = now.getMilliseconds();

            document.getElementById('h').style.transform = `rotate(${(h % 12) * 30 + m * 0.5}deg)`;
            document.getElementById('m').style.transform = `rotate(${m * 6 + s * 0.1}deg)`;
            
            document.getElementById('s').style.transform = `rotate(${s * 6 + ms * 0.006}deg)`;

            requestAnimationFrame(update);
        }

        window.addEventListener('resize', createTicks);
        createTicks();
        update();
    </script>
</body>
</html>
