<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            min-height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: #050505; font-family: 'Segoe UI', sans-serif;
        }

        .clock {
            width: 85vmin; height: 85vmin; max-width: 450px; max-height: 450px;
            border-radius: 50%; position: relative;
            background: radial-gradient(circle at 30% 30%, #444, #111 40%, #000);
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 20px rgba(255,255,255,0.1), 0 0 0 10px #1a1a1a;
        }

        /* شاشة البيانات الذكية (المرحلة 7) */
        .smart-display {
            position: absolute;
            top: 60%; left: 50%; transform: translateX(-50%);
            width: 80px; height: 30px;
            background: #0a0a0a; border: 1px solid #333;
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
            color: #0ef; font-family: 'Courier New', monospace; font-size: 12px;
            box-shadow: inset 0 0 10px rgba(0, 238, 255, 0.2);
            z-index: 1;
        }

        .face {
            position: absolute; width: 92%; height: 92%; top: 4%; left: 4%;
            border-radius: 50%; background: #080808;
            border: 1px solid #222;
        }

        /* العقارب النيونية المتطورة */
        .hand {
            position: absolute; bottom: 50%; left: 50%;
            transform-origin: bottom center; z-index: 10;
        }
        .hour { width: 6px; height: 25%; background: #fff; border-radius: 4px; margin-left: -3px; }
        .minute { width: 4px; height: 35%; background: #0ef; border-radius: 4px; margin-left: -2px; box-shadow: 0 0 10px #0ef; }
        .second { width: 2px; height: 42%; background: #ff0055; margin-left: -1px; }

        .center {
            position: absolute; width: 12px; height: 12px; background: #fff;
            border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 20; border: 2px solid #0ef;
        }
    </style>
</head>
<body>

<div class="clock">
    <div class="face">
        <div class="smart-display" id="digital">00:00</div>
    </div>
    <div class="hand hour" id="h"></div>
    <div class="hand minute" id="m"></div>
    <div class="hand second" id="s"></div>
    <div class="center"></div>
</div>

<script>
    function update() {
        const now = new Date();
        const h = now.getHours();
        const m = now.getMinutes();
        const s = now.getSeconds();
        const ms = now.getMilliseconds();

        // تحديث العقارب
        document.getElementById('h').style.transform = `rotate(${(h % 12) * 30 + m * 0.5}deg)`;
        document.getElementById('m').style.transform = `rotate(${m * 6 + s * 0.1}deg)`;
        document.getElementById('s').style.transform = `rotate(${s * 6 + ms * 0.006}deg)`;

        // تحديث الشاشة الذكية (المرحلة 7)
        const timeStr = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        document.getElementById('digital').innerText = timeStr;

        requestAnimationFrame(update);
    }
    update();
</script>
</body>
</html>
