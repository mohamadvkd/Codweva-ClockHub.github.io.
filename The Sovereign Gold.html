<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:radial-gradient(ellipse at center,#2c2416 0%,#1a1510 100%);overflow:hidden}
        .clock{width:85vmin;height:85vmin;max-width:500px;max-height:500px;border-radius:50%;position:relative;background:radial-gradient(circle at 40% 40%,#f4e4bc 0%,#d4af37 30%,#8b7355 60%,#4a3728 100%);box-shadow:0 2vh 6vh rgba(0,0,0,0.8),inset 0 0 10vmin rgba(0,0,0,0.3),0 0 0 1.5vmin #2a2015,0 0 0 2vmin #d4af37,0 0 0 3.5vmin #1a1510}
        .face{position:absolute;width:85%;height:85%;top:7.5%;left:7.5%;border-radius:50%;background:radial-gradient(circle at 50% 50%,#fffdf5 0%,#f5f0e1 70%,#e8dcc0 100%);box-shadow:inset 0 0 3vmin rgba(139,115,85,0.3),0 0.5vh 1.5vh rgba(0,0,0,0.3)}
        .roman{position:absolute;color:#2a2015;font:700 4.5vmin 'Times New Roman',serif;left:50%;top:50%;transform:translate(-50%,-50%)}
        .tick{position:absolute;width:0.3vmin;height:2.5vmin;background:#8b7355;left:50%;top:2%;transform-origin:center 34.5vmin;margin-left:-0.15vmin}
        .tick.m{width:0.8vmin;height:4.5vmin;background:#2a2015}
        .hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom center;z-index:10;transition:transform 0.05s cubic-bezier(0.4,2.5,0.6,1);filter:drop-shadow(0 0.5vh 0.5vh rgba(0,0,0,0.3))}
        .h{width:1.5vmin;height:22vmin;background:linear-gradient(to top,#2a2015 0%,#4a3728 100%);margin-left:-0.75vmin;border-radius:1vmin}
        .m{width:1vmin;height:32vmin;background:linear-gradient(to top,#2a2015 0%,#5c4033 100%);margin-left:-0.5vmin;border-radius:0.8vmin}
        .s{width:0.5vmin;height:38vmin;background:#8b0000;margin-left:-0.25vmin;border-radius:0.5vmin}
        .s::before{content:'';position:absolute;width:2vmin;height:2vmin;background:#8b0000;border-radius:50%;top:-1vmin;left:50%;transform:translateX(-50%)}
        .center{position:absolute;width:4vmin;height:4vmin;background:radial-gradient(circle,#d4af37 0%,#8b7355 100%);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;box-shadow:0 0.5vh 1vh rgba(0,0,0,0.3)}
        .brand{position:absolute;top:28%;left:50%;transform:translateX(-50%);color:#8b7355;font:italic 2.5vmin 'Times New Roman',serif;letter-spacing:0.5vmin}
    </style>
</head>
<body>
    <div class="clock">
        <div class="face" id="f"></div>
        <div class="brand">LUXURY</div>
        <div class="hand h" id="hour"></div>
        <div class="hand m" id="min"></div>
        <div class="hand s" id="sec"></div>
        <div class="center"></div>
    </div>
    <script>
        const r=['XII','I','II','III','IV','V','VI','VII','VIII','IX','X','XI'],f=document.getElementById('f');
        function init(){f.innerHTML='';const rad=f.offsetWidth/2;for(let i=0;i<60;i++){f.innerHTML+=`<div class="tick ${i%5?'':'m'}" style="transform:rotate(${i*6}deg);transform-origin:center ${rad}px"></div>`;if(i%5===0)f.innerHTML+=`<div class="roman" style="transform:translate(-50%,-50%) rotate(${i*6}deg) translateY(-${rad*0.82}px) rotate(${-i*6}deg)">${r[i/5]}</div>`}}
        function update(){const n=new Date(),ms=n.getMilliseconds();document.getElementById('hour').style.transform=`rotate(${(n.getHours()%12)*30+n.getMinutes()*0.5}deg)`;document.getElementById('min').style.transform=`rotate(${n.getMinutes()*6+n.getSeconds()*0.1}deg)`;document.getElementById('sec').style.transform=`rotate(${n.getSeconds()*6+ms*0.006}deg)`;requestAnimationFrame(update)}
        window.addEventListener('resize',init);init();update();
    </script>
</body>
</html>
